<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Exemplo de formulário</h1>
    <form action="#" method="get" autocomplete="on">
        <fieldset>
            <legend>Sexo</legend>
            <input type="radio" name="sexo" id="isxmas"><label for="isxmas">Masculino</label><br>
            <input type="radio" name="sexo" id="isxfem" checked><label for="isxfem">Feminino</label>
        </fieldset>
        <fieldset>
            <legend>Esportes favoritos</legend>
            <input type="checkbox" name="esfut" id="iesfut" checked><label for="iesfut">Futebol</label><br>
            <input type="checkbox" name="esbas" id="ibasq"><label for="ibasq">Basquete</label><br>
            <input type="checkbox" name="esnat" id="inat"><label for="inat">Natação</label><br>
            <input type="checkbox" name="esten" id="iten"><label for="iten">Tenis</label><br>
        </fieldset>
 

        <p><input type="submit">ENVIAR</p>
        <P><input type="submit">LIMPAR</input></P>
    </form>
</html>
