<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudos de ifrme</title>
    <style>
        iframe {
            width: 400px;
            height: 400px;
            border: 1px dashed black;
        }
    </style>
</head>
<body>
    <h1>Testando o uso de iframe</h1>
    <h3>Acessando site por link</h3>
    <p>Acessando o site do <a href="https://www.cursoemvideo.com" target="_blank">CursoemVideo</a> para aprender a programar.</p> 
    <h3>Acessando site por iframe</h3>
    <p>Acessando o site do <iframe src="https://www.cursoemvideo.com" frameborder="0" scolling="no";></iframe>  para aprender a programar.</p>
    <p>Acessando o repositório do <iframe src="https://gustavoguanabara.github.io" frameborder="0"></iframe>  para aprender a programar.</p>

</body>
</html>
